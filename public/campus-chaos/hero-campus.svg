      <text x="125" y="128" text-anchor="middle" font-family="Arial" font-size="54">🍔</text>
    </g>
    <g transform="translate(785 210)">
      <rect x="0" y="64" width="250" height="170" rx="30" fill="#70d6ff"/>
      <path d="M22 82L125 6L228 82Z" fill="#2779ff"/>
      <rect x="38" y="116" width="74" height="90" rx="14" fill="#effbff"/>
      <rect x="138" y="118" width="74" height="52" rx="14" fill="#effbff"/>
      <text x="125" y="254" text-anchor="middle" font-family="Inter,Arial" font-size="28" font-weight="900" fill="#074269">COPY CENTER</text>
      <text x="125" y="148" text-anchor="middle" font-family="Arial" font-size="52">🖨️</text>
    </g>
    <g transform="translate(432 474)">
