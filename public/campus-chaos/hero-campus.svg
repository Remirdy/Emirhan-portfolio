      <rect x="45" y="96" width="62" height="82" rx="12" fill="#f5f0ff"/>
      <rect x="124" y="96" width="62" height="82" rx="12" fill="#f5f0ff"/>
      <rect x="203" y="96" width="62" height="82" rx="12" fill="#f5f0ff"/>
      <text x="155" y="216" text-anchor="middle" font-family="Inter,Arial" font-size="30" font-weight="900" fill="#2d216d">LIBRARY</text>
      <text x="155" y="130" text-anchor="middle" font-family="Arial" font-size="54">📚</text>
    </g>
