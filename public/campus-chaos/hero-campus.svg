    <g transform="translate(522 300)"><circle r="22" fill="#fff"/><text y="8" text-anchor="middle" font-size="24">☕</text></g>
    <g transform="translate(720 480)"><circle r="22" fill="#fff"/><text y="8" text-anchor="middle" font-size="24">🧑‍🎓</text></g>
    <g transform="translate(900 420)"><circle r="22" fill="#fff"/><text y="8" text-anchor="middle" font-size="24">📓</text></g>
