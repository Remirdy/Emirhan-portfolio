<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Campus Chaos Tycoon campus illustration</title>
  <desc id="desc">A colorful cartoon university campus map with canteen, copy center, library, students and event bubbles.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bdf4ff"/>
      <stop offset="1" stop-color="#f7fff0"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93f5a7"/>
      <stop offset="1" stop-color="#35c87d"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe7a2"/>
      <stop offset="1" stop-color="#ffc96b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="780" rx="64" fill="url(#sky)"/>
  <circle cx="980" cy="120" r="72" fill="#fff4a8" opacity="0.9"/>
  <circle cx="160" cy="130" r="54" fill="#ffffff" opacity="0.55"/>
  <circle cx="226" cy="120" r="36" fill="#ffffff" opacity="0.42"/>
  <rect x="70" y="170" width="1060" height="520" rx="58" fill="url(#grass)" filter="url(#shadow)"/>
  <path d="M592 690C592 600 592 514 592 420C592 354 606 277 622 194" stroke="url(#road)" stroke-width="74" stroke-linecap="round"/>
  <path d="M150 438C330 408 460 424 592 420C734 416 876 380 1050 350" stroke="url(#road)" stroke-width="68" stroke-linecap="round"/>
  <circle cx="596" cy="420" r="84" fill="#8df0a0" stroke="#fff0b3" stroke-width="22"/>
  <circle cx="596" cy="420" r="38" fill="#3bc67e"/>

  <g filter="url(#shadow)">
